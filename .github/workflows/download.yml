name: Download Content

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Tags (comma separated)'
        required: true
        default: 'catGirl'
      images:
        description: 'Number of images'
        required: true
        default: '5'
      gifs:
        description: 'Number of GIFs'
        required: true
        default: '3'
      videos:
        description: 'Number of videos'
        required: true
        default: '10'
      video_min_duration:
        description: 'Minimum video duration (seconds, 0=no filter)'
        required: true
        default: '0'
      use_api:
        description: 'Use API mode? (recommended)'
        required: true
        default: 'true'
      compress_files:
        description: 'Compress files >50MB?'
        required: true
        default: 'true'
      max_total:
        description: 'Max posts to check'
        required: true
        default: '3000'

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install dotnet-script
      run: dotnet tool install -g dotnet-script

    - name: Run Download Script
      run: |
        EXTRA_ARGS=""
        if [ "${{ github.event.inputs.use_api }}" = "false" ]; then
          EXTRA_ARGS="--no-api"
        fi
        if [ "${{ github.event.inputs.compress_files }}" = "false" ]; then
          EXTRA_ARGS="$EXTRA_ARGS --no-compress"
        fi
        
        dotnet script script.csx \
          --tags "${{ github.event.inputs.tags }}" \
          --images ${{ github.event.inputs.images }} \
          --gifs ${{ github.event.inputs.gifs }} \
          --videos ${{ github.event.inputs.videos }} \
          --video-min-duration ${{ github.event.inputs.video_min_duration }} \
          --max-total ${{ github.event.inputs.max_total }} \
          $EXTRA_ARGS

    - name: Commit and Push changes
      shell: bash
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        
        git add downloads/
        
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git pull --rebase origin main || echo "Pull failed, continuing"
          git commit -m "Update: ${{ github.event.inputs.tags }} | I:${{ github.event.inputs.images }} G:${{ github.event.inputs.gifs }} V:${{ github.event.inputs.videos }} MinDur:${{ github.event.inputs.video_min_duration }}s"
          git push origin main
        fi
