name: Download Content

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Search tags (comma separated)'
        required: true
        default: 'catGirl'
        type: string
      images:
        description: 'Number of images to download'
        required: true
        default: 5
        type: number
      gifs:
        description: 'Number of GIFs to download'
        required: true
        default: 3
        type: number
      videos:
        description: 'Number of videos to download'
        required: true
        default: 10
        type: number
      video_min_duration:
        description: 'Minimum video duration in seconds'
        required: true
        default: 0
        type: number
      compress_files:
        description: 'Compress files larger than 90MB (true/false)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      max_total:
        description: 'Maximum number of posts to check'
        required: true
        default: 3000
        type: number
      site:
        description: 'Site to download from (RX, RP, RN, BB, EN, RS)'
        required: true
        default: 'RX'
        type: choice
        options:
          - 'RX'
          - 'RP'
          - 'RN'
          - 'BB'
          - 'EN'
          - 'RS'

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Install dotnet-script
      run: |
        dotnet tool install -g dotnet-script
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
    
    - name: Create downloads directory
      run: mkdir -p downloads
    
    - name: Run download script
      run: |
        SCRIPT_ARGS="--tags '${{ github.event.inputs.tags }}' \
                     --images ${{ github.event.inputs.images }} \
                     --gifs ${{ github.event.inputs.gifs }} \
                     --videos ${{ github.event.inputs.videos }} \
                     --video-min-duration ${{ github.event.inputs.video_min_duration }} \
                     --max-total ${{ github.event.inputs.max_total }} \
                     --site '${{ github.event.inputs.site }}'"
        
        if [ "${{ github.event.inputs.compress_files }}" = "false" ]; then
          SCRIPT_ARGS="$SCRIPT_ARGS --no-compress"
        fi
        
        dotnet-script script.csx $SCRIPT_ARGS
    
    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
    
    - name: Commit and push if changes exist
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          git add .
          git commit -m "Download content from ${{ github.event.inputs.site }} - Tags: ${{ github.event.inputs.tags }} - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        else
          echo "No changes to commit"
        fi
