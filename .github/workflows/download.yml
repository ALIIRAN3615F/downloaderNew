name: Download Content

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Tags (comma separated)'
        required: true
        default: 'catGirl'
      images:
        description: 'Number of images'
        required: true
        default: '5'
      gifs:
        description: 'Number of GIFs'
        required: true
        default: '3'
      videos:
        description: 'Number of videos'
        required: true
        default: '10'
      video_min_duration:
        description: 'Minimum video duration (seconds, 0=no filter)'
        required: true
        default: '0'
      use_api:
        description: 'Use API mode? (recommended)'
        required: true
        default: 'true'
      compress_files:
        description: 'Compress files >50MB?'
        required: true
        default: 'true'
      max_total:
        description: 'Max posts to check'
        required: true
        default: '3000'

jobs:
  download:
    runs-on: ubuntu-latest
    env:
      IMAGES: ${{ github.event.inputs.images }}
      GIFS: ${{ github.event.inputs.gifs }}
      VIDEOS: ${{ github.event.inputs.videos }}
      VIDEO_MIN_DUR: ${{ github.event.inputs.video_min_duration }}
      USE_API: ${{ github.event.inputs.use_api }}
      COMPRESS_FILES: ${{ github.event.inputs.compress_files }}
      MAX_TOTAL: ${{ github.event.inputs.max_total }}
      TAGS: ${{ github.event.inputs.tags }}

    steps:
    - name: Checkout repository (full history for pull/push)
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install dotnet-script
      run: dotnet tool install -g dotnet-script

    - name: Run Download Script
      run: |
        EXTRA_ARGS=""
        if [ "$USE_API" = "false" ]; then
          EXTRA_ARGS="--no-api"
        fi
        if [ "$COMPRESS_FILES" = "false" ]; then
          EXTRA_ARGS="$EXTRA_ARGS --no-compress"
        fi
        
        dotnet script script.csx \
          --tags "$TAGS" \
          --images $IMAGES \
          --gifs $GIFS \
          --videos $VIDEOS \
          --video-min-duration $VIDEO_MIN_DUR \
          --max-total $MAX_TOTAL \
          $EXTRA_ARGS

    - name: Commit and Push changes
      shell: bash
      run: |
        # ابتدا pull برای گرفتن آخرین تغییرات (اگر کسی دیگری push کرده باشد)
        git pull --rebase origin main || echo "Pull failed or no changes, continuing"
        
        # حالا فایل‌های جدید را stage می‌کنیم
        git add downloads/
        
        # اگر تغییری نبوده commit انجام نمی‌شود
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git commit -m "Update: $TAGS | I:$IMAGES G:$GIFS V:$VIDEOS MinDur:${VIDEO_MIN_DUR}s"
          git push origin main
        fi
