name: Download Content

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Comma separated tags'
        required: true
        default: 'catGirl'
      images:
        description: 'Number of images'
        required: true
        default: '5'
      gifs:
        description: 'Number of GIFs'
        required: true
        default: '3'
      videos:
        description: 'Number of videos'
        required: true
        default: '2'
      use_api:
        description: 'Use API mode?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      compress_files:
        description: 'Compress large files?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      max_total:
        description: 'Maximum total posts to check'
        required: true
        default: '1000'

env:
  IMAGES: ${{ github.event.inputs.images }}
  GIFS: ${{ github.event.inputs.gifs }}
  VIDEOS: ${{ github.event.inputs.videos }}
  USE_API: ${{ github.event.inputs.use_api }}
  COMPRESS_FILES: ${{ github.event.inputs.compress_files }}
  MAX_TOTAL: ${{ github.event.inputs.max_total }}

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Install dotnet-script
      run: dotnet tool install -g dotnet-script
    
    - name: Run Download Script
      run: |
        if [ "$USE_API" = "false" ]; then
          dotnet script script.csx --tags "${{ github.event.inputs.tags }}" \
            --images $IMAGES \
            --gifs $GIFS \
            --videos $VIDEOS \
            --max-total $MAX_TOTAL \
            --no-api
        else
          dotnet script script.csx --tags "${{ github.event.inputs.tags }}" \
            --images $IMAGES \
            --gifs $GIFS \
            --videos $VIDEOS \
            --max-total $MAX_TOTAL
        fi
    
    - name: Setup Git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
    
    - name: Add and Commit changes
      run: |
        git add downloads/
        git pull --rebase origin main
        git commit -m "Update: Downloaded content for tag '${{ github.event.inputs.tags }}' - Images:$IMAGES GIFs:$GIFS Videos:$VIDEOS" || echo "No changes to commit"
    
    - name: Push changes
      run: git push origin main
