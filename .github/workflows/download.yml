name: 🤖 Download & Commit

on:
  workflow_dispatch:
    inputs:
      tags:
        description: '🏷️ Tags (e.g., catgirl+solo)'
        required: true
      quantity:
        description: '🔢 تعداد (Number of items)'
        required: false
        default: '10'
      use_api:
        description: '⚙️ Use API instead of HTML?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: 📦 Install dotnet-script
        run: dotnet tool install -g dotnet-script

      - name: 🚀 Run download script
        run: |
          dotnet script download-script.csx -- `
            --tags "${{ inputs.tags }}" `
            --quantity ${{ inputs.quantity }} `
            --path downloads `
            ${{ inputs.use_api == 'true' && '--api' || '' }}

      - name: 📤 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "📥 Auto-download: tags=${{ inputs.tags }} qty=${{ inputs.quantity }}" || echo "No changes"
          git push
