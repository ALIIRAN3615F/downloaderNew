name: Rule34 Batch Download

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Tags (e.g., angel+blonde)'
        required: true
      images:
        description: 'Number of images'
        default: '0'
      gifs:
        description: 'Number of gifs'
        default: '0'
      videos:
        description: 'Number of videos'
        default: '0'
      max_total:
        description: 'Max total posts to scan'
        default: '2000'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dotnet-script
        run: dotnet tool install -g dotnet-script

      - name: Run downloader
        env:
          TAGS: ${{ inputs.tags }}
          IMAGES: ${{ inputs.images }}
          GIFS: ${{ inputs.gifs }}
          VIDEOS: ${{ inputs.videos }}
          MAX_TOTAL: ${{ inputs.max_total }}
        run: |
          dotnet script script.csx \
            --tags "$TAGS" \
            --images $IMAGES \
            --gifs $GIFS \
            --videos $VIDEOS \
            --max-total $MAX_TOTAL

      - name: Commit downloaded content
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Downloaded: images=${IMAGES}, gifs=${GIFS}, videos=${VIDEOS} for tags='${TAGS}'"
            git push
          fi
