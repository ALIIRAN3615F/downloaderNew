name: Rule34 Batch Download

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Tags (e.g., angel+blonde)'
        required: true
      images:
        description: 'Number of images'
        default: '10'
      gifs:
        description: 'Number of gifs'
        default: '10'
      videos:
        description: 'Number of videos'
        default: '10'
      use_api:
        description: 'Use API (true/false)'
        default: 'true'
      max_total:
        description: 'Max posts to scan (API mode only)'
        default: '2000'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dotnet-script
        run: dotnet tool install -g dotnet-script

      - name: Run downloader
        env:
          TAGS: ${{ inputs.tags }}
          IMAGES: ${{ inputs.images }}
          GIFS: ${{ inputs.gifs }}
          VIDEOS: ${{ inputs.videos }}
          USE_API: ${{ inputs.use_api }}
          MAX_TOTAL: ${{ inputs.max_total }}
        run: |
          if [ "$USE_API" = "false" ]; then
            dotnet script script.csx \
              --tags "$TAGS" \
              --images $IMAGES \
              --gifs $GIFS \
              --videos $VIDEOS \
              --no-api
          else
            dotnet script script.csx \
              --tags "$TAGS" \
              --images $IMAGES \
              --gifs $GIFS \
              --videos $VIDEOS \
              --max-total $MAX_TOTAL
          fi

      - name: Commit downloaded content
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Downloaded: images=${IMAGES}, gifs=${GIFS}, videos=${VIDEOS} for tags='${TAGS}' (mode=${USE_API})"
            git push
          fi
