name: Download Content

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Tags to search for'
        required: true
        default: 'catGirl'
      images:
        description: 'Number of images to download'
        required: false
        default: '5'
      gifs:
        description: 'Number of gifs to download'
        required: false
        default: '3'
      videos:
        description: 'Number of videos to download'
        required: false
        default: '10'
      video_min_duration:
        description: 'Minimum video duration in seconds'
        required: false
        default: '0'
      compress_files:
        description: 'Compress files larger than 90MB'
        required: false
        default: 'true'
      max_total:
        description: 'Maximum number of posts to check'
        required: false
        default: '3000'
      site:
        description: 'Site to download from (RX, RP, RN, BB, EN, RS)'
        required: false
        default: 'RX'

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dotnet-script
        run: dotnet tool install -g dotnet-script

      - name: Run Download Script
        run: |
          SCRIPT_ARGS="--tags \"${{ inputs.tags }}\" \
            --images ${{ inputs.images }} \
            --gifs ${{ inputs.gifs }} \
            --videos ${{ inputs.videos }} \
            --video-min-duration ${{ inputs.video_min_duration }} \
            --max-total ${{ inputs.max_total }} \
            --site ${{ inputs.site }}"
          
          if [ "${{ inputs.compress_files }}" = "false" ]; then
            SCRIPT_ARGS="$SCRIPT_ARGS --no-compress"
          fi
          
          dotnet script script.csx $SCRIPT_ARGS

      - name: Configure Git for push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Commit and Push changes
        run: |
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Downloaded content for tags: ${{ inputs.tags }} from site: ${{ inputs.site }}"
            git push
          else
            echo "No changes to commit"
          fi
