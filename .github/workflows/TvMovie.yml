name: 🎥 Record rule34.world video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the video page (only rule34.world and subdomains allowed)'
        required: true
        type: string
      duration:
        description: 'Recording duration in seconds'
        required: true
        type: number
        default: 30
      click_selector:
        description: 'Optional CSS selector to click before recording'
        required: false
        type: string

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            pulseaudio \
            ffmpeg \
            libgbm1 \
            libnss3 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libasound2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Puppeteer
        run: |
          npm init -y
          npm install puppeteer@21.7.0

      - name: Create record.js
        run: |
          cat > record.js << 'EOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          const { exec } = require('child_process');

          const URL = process.env.INPUT_URL;
          const DURATION = parseInt(process.env.INPUT_DURATION) || 30;
          const CLICK_SELECTOR = process.env.INPUT_CLICK_SELECTOR || '';
          const OUTPUT_FILE = 'recording.mp4';

          // Utility: normalize URL
          function normalizeUrl(url) {
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
              return 'https://' + url;
            }
            return url;
          }

          // Utility: get hostname
          function getHostname(url) {
            try {
              return new URL(url).hostname;
            } catch {
              return null;
            }
          }

          // Utility: check if URL is allowed (only rule34.world and subdomains)
          function isAllowedUrl(url) {
            const host = getHostname(url);
            if (!host) return false;
            return host === 'rule34.world' || host.endsWith('.rule34.world');
          }

          // Ensure we stay on the original domain; if not, navigate back
          async function ensureSameDomain(page, originalUrl) {
            const currentHost = getHostname(page.url());
            const originalHost = getHostname(originalUrl);
            if (currentHost !== originalHost) {
              console.log(`Redirect detected (${currentHost}), returning to ${originalHost}`);
              await page.goto(originalUrl, { waitUntil: 'networkidle2' });
              return false;
            }
            return true;
          }

          // Click cookie / consent banners using text matching
          async function clickCookieButtons(page) {
            const patterns = [/accept/i, /ok\b/i, /continue/i, /agree/i, /consent/i, /allow/i, /got it/i];
            for (const pattern of patterns) {
              const button = await page.evaluateHandle((regexStr) => {
                const regex = new RegExp(regexStr.source, regexStr.flags);
                const elements = document.querySelectorAll('button, a[role="button"], [role="button"], .button');
                for (const el of elements) {
                  if (regex.test(el.textContent.trim())) return el;
                }
                return null;
              }, pattern);
              if (button.asElement()) {
                await button.asElement().click({ delay: 100 });
                console.log(`Clicked cookie button: "${pattern}"`);
                await page.waitForTimeout(1000);
                return;
              }
            }
          }

          // Close extra tabs/popups and modal overlays
          async function closePopups(browser, page) {
            // Close extra browser pages/tabs
            const pages = await browser.pages();
            for (const p of pages) {
              if (p !== page && !p.isClosed()) {
                await p.close();
                console.log('Closed extra tab/popup');
              }
            }

            // Try to close modal popups by looking for close/X buttons
            const closeButtons = await page.$$('button, [role="button"], a');
            for (const btn of closeButtons) {
              if (await btn.isIntersectingViewport()) {
                const text = await btn.evaluate(el => el.textContent.trim());
                if (/^(close|x|dismiss|cancel)$/i.test(text) || text.length <= 5) {
                  await btn.click({ delay: 100 });
                  console.log(`Closed popup with button text: "${text}"`);
                  await page.waitForTimeout(500);
                  break;
                }
              }
            }
          }

          // Force HTML5 video elements to play
          async function forcePlayInPage(page) {
            try {
              await page.evaluate(() => {
                document.querySelectorAll('video').forEach(v => {
                  if (v.paused) v.play().catch(() => {});
                });
              });
            } catch (e) {
              console.log('forcePlayInPage error:', e.message);
            }
          }

          // Full interactive click on an element (move + mousedown + mouseup + MouseEvent)
          async function performRealClick(frame, element) {
            const box = await element.boundingBox();
            if (!box) return false;
            const x = box.x + box.width / 2;
            const y = box.y + box.height / 2;
            await frame.mouse.move(x, y);
            await frame.waitForTimeout(100);
            await frame.mouse.down();
            await frame.waitForTimeout(50);
            await frame.mouse.up();
            await frame.waitForTimeout(50);
            await frame.evaluate((el, cx, cy) => {
              el.dispatchEvent(new MouseEvent('click', {
                view: window,
                bubbles: true,
                cancelable: true,
                clientX: cx,
                clientY: cy
              }));
            }, element, x, y);
            return true;
          }

          // Try to click any video‑related element inside a given frame
          async function clickCandidatesInFrame(frame) {
            const selectors = [
              'video',
              'button[aria-label*="play" i]',
              'button[title*="play" i]',
              '[class*="play" i]',
              '[id*="play" i]',
              '.video-card',
              '.video',
              '.thumb',
              '.thumbnail',
              '.poster',
              '.card',
              '[class*="thumb" i]',
              '[class*="poster" i]',
              '[class*="video" i]',
              '[data-testid*="video" i]',
              '[data-test*="video" i]'
            ];
            for (const sel of selectors) {
              try {
                const elements = await frame.$$(sel);
                for (const el of elements) {
                  if (await el.isIntersectingViewport()) {
                    const clicked = await performRealClick(frame, el);
                    if (clicked) {
                      console.log(`Clicked "${sel}" inside frame`);
                      await frame.waitForTimeout(2000);
                      return true;
                    }
                  }
                }
              } catch (e) {
                console.log(`Error with selector "${sel}":`, e.message);
              }
            }
            return false;
          }

          // Search for clickable items in main page + iframes
          async function smartClickHandle(page) {
            if (await clickCandidatesInFrame(page)) return true;
            const frames = page.frames();
            for (const f of frames) {
              if (f !== page.mainFrame()) {
                if (await clickCandidatesInFrame(f)) return true;
              }
            }
            return false;
          }

          // Main click logic: custom selector first, then auto‑detect
          async function clickVideoOrItem(page) {
            if (CLICK_SELECTOR) {
              try {
                const el = await page.$(CLICK_SELECTOR);
                if (el && await el.isIntersectingViewport()) {
                  const clicked = await performRealClick(page, el);
                  if (clicked) {
                    console.log(`Clicked custom selector: ${CLICK_SELECTOR}`);
                    await page.waitForTimeout(2000);
                    return true;
                  }
                }
              } catch (e) {
                console.log(`Custom selector failed: ${e.message}`);
              }
            }
            return await smartClickHandle(page);
          }

          (async function main() {
            console.log('📹 Starting recording process');
            console.log(`URL: ${URL}`);
            console.log(`Duration: ${DURATION}s`);
            console.log(`Custom selector: ${CLICK_SELECTOR || '(none)'}`);

            const normalizedUrl = normalizeUrl(URL);
            console.log(`Normalized: ${normalizedUrl}`);
            if (!isAllowedUrl(normalizedUrl)) {
              throw new Error(`Domain not allowed. Only rule34.world and subdomains are permitted.`);
            }

            // Start browser (use Puppeteer's own Chromium)
            const browser = await puppeteer.launch({
              headless: true,
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-gpu',
                '--window-size=1280,720',
                '--disable-web-security',
                '--disable-features=IsolateOrigins,site-per-process'
              ],
              defaultViewport: { width: 1280, height: 720 }
            });

            try {
              const page = await browser.newPage();
              page.setDefaultNavigationTimeout(30000);
              page.setDefaultTimeout(10000);

              // Block navigation requests to external domains
              await page.setRequestInterception(true);
              page.on('request', (req) => {
                if (req.isNavigationRequest() && !isAllowedUrl(req.url())) {
                  console.log(`Blocked navigation to: ${req.url()}`);
                  req.abort();
                } else {
                  req.continue();
                }
              });

              console.log('Navigating...');
              await page.goto(normalizedUrl, { waitUntil: 'networkidle2', timeout: 30000 });

              // Stay on the allowed domain
              await ensureSameDomain(page, normalizedUrl);

              // Accept cookies / consent
              await clickCookieButtons(page);
              await page.waitForTimeout(1000);

              // Close popups
              await closePopups(browser, page);

              // Try to click a video/thumbnail/play button
              console.log('Looking for playable element...');
              const clicked = await clickVideoOrItem(page);
              console.log(clicked ? '✅ Clicked' : '⚠️ No clickable element found');

              // Force play any video
              await forcePlayInPage(page);

              // ----- FFmpeg recording -----
              console.log('🎬 Starting FFmpeg...');
              const ffmpegCmd = [
                'ffmpeg',
                '-f', 'x11grab',
                '-video_size', '1280x720',
                '-framerate', '30',
                '-i', ':99',
                '-f', 'pulse',
                '-i', 'virtual_sink.monitor',    // monitor of the virtual sink
                '-c:v', 'libx264',
                '-preset', 'fast',
                '-c:a', 'aac',
                '-b:a', '128k',
                '-pix_fmt', 'yuv420p',
                '-t', String(DURATION),
                '-y',
                OUTPUT_FILE
              ].join(' ');

              const ffmpeg = exec(ffmpegCmd, (err) => {
                if (err) console.error('FFmpeg exited with error:', err);
              });

              // Keep the page stable while recording
              const endTime = Date.now() + DURATION * 1000;
              console.log(`⏱ Recording ${DURATION}s...`);
              while (Date.now() < endTime) {
                await ensureSameDomain(page, normalizedUrl);
                await closePopups(browser, page);
                const remaining = Math.min(5000, endTime - Date.now());
                if (remaining > 0) await page.waitForTimeout(remaining);
              }

              console.log('🛑 Stopping FFmpeg...');
              ffmpeg.kill('SIGINT');
              await new Promise(resolve => setTimeout(resolve, 2000));

              // Verify the output file
              if (fs.existsSync(OUTPUT_FILE)) {
                const sizeMB = (fs.statSync(OUTPUT_FILE).size / (1024 * 1024)).toFixed(1);
                console.log(`✅ Recording saved: ${OUTPUT_FILE} (${sizeMB} MB)`);
              } else {
                console.error('❌ Output file not created!');
                process.exit(1);
              }
            } finally {
              await browser.close();
              console.log('🏁 Done');
            }
          })().catch(err => {
            console.error('Fatal error:', err);
            process.exit(1);
          });
          EOF

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          export DISPLAY=:99
          echo "DISPLAY=$DISPLAY" >> $GITHUB_ENV

      - name: Start PulseAudio virtual sink
        run: |
          pulseaudio --start --exit-idle-time=-1
          pactl load-module module-virtual-sink sink_name=virtual_sink
          pactl set-default-sink virtual_sink

      - name: Run recording script
        env:
          DISPLAY: :99
          INPUT_URL: ${{ inputs.url }}
          INPUT_DURATION: ${{ inputs.duration }}
          INPUT_CLICK_SELECTOR: ${{ inputs.click_selector }}
        run: |
          export DISPLAY=:99
          node record.js

      - name: Upload recording as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rule34-recording
          path: recording.mp4
          retention-days: 1

      - name: Cleanup
        if: always()
        run: |
          pkill -f Xvfb || true
          pkill -f pulseaudio || true
